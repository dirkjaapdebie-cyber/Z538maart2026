<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessie</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: auto; }
        .hidden { display: none; }
        
        /* Stijlen voor de interactie */
        .vraag-blok { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .antwoord-lijst { margin-top: 10px; color: #333; padding-left: 20px; }
        .scroll-veld { max-height: 500px; overflow-y: auto; border: 2px solid #333; padding: 15px; background: #fff; }
        
        input[type="text"] { width: 70%; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>

<div class="container" id="scherm1">
    <h1>Vragen invoeren</h1>
    <p>Voer hier de vraag in die je wilt stellen:</p>
    <input type="text" id="nieuweVraag" placeholder="Typ je vraag hier...">
    <button onclick="voegVraagToe()">Stel Vraag</button>

    <hr>

    <div id="liveFeedInput">
        </div>

    <br>
    <button onclick="wisselScherm()">Naar het volgende scherm</button>
</div>

<div class="container hidden" id="scherm2">
    <h1>Vragen en antwoorden livefeed</h1>
    <div class="scroll-veld" id="liveFeedScroll">
        </div>
    <br>
    <button onclick="wisselScherm()">Terug naar invoer</button>
</div>

<script>
    let dataStore = [];

    function voegVraagToe() {
        const input = document.getElementById('nieuweVraag');
        if (input.value.trim() === "") return;

        const item = {
            vraag: input.value,
            antwoorden: []
        };

        dataStore.push(item);
        input.value = "";
        updateVisuals();
    }

    function voegAntwoordToe(index) {
        const aInput = document.getElementById(`a-input-${index}`);
        if (aInput.value.trim() === "") return;

        dataStore[index].antwoorden.push(aInput.value);
        aInput.value = "";
        updateVisuals();
    }

    function updateVisuals() {
        const feed1 = document.getElementById('liveFeedInput');
        const feed2 = document.getElementById('liveFeedScroll');
        
        feed1.innerHTML = "<h3>Live Feed (geef hier antwoord):</h3>";
        feed2.innerHTML = "";

        dataStore.forEach((item, index) => {
            // Scherm 1 opbouw
            const div1 = document.createElement('div');
            div1.className = 'vraag-blok';
            div1.innerHTML = `
                <strong>Vraag: ${item.vraag}</strong><br><br>
                <input type="text" id="a-input-${index}" placeholder="Typ een antwoord...">
                <button onclick="voegAntwoordToe(${index})">Antwoord geven</button>
                <ul class="antwoord-lijst">${item.antwoorden.map(a => `<li>${a}</li>`).join('')}</ul>
            `;
            feed1.appendChild(div1);

            // Scherm 2 opbouw (Scrollbaar veld)
            const div2 = document.createElement('div');
            div2.className = 'vraag-blok';
            div2.innerHTML = `
                <strong>Vraag: ${item.vraag}</strong>
                <ul class="antwoord-lijst">${item.antwoorden.map(a => `<li>${a}</li>`).join('')}</ul>
            `;
            feed2.appendChild(div2);
        });
    }

    function wisselScherm() {
        document.getElementById('scherm1').classList.toggle('hidden');
        document.getElementById('scherm2').classList.toggle('hidden');
    }
</script>

</body>
</html>

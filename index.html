<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z53 Hebreeën Les 2 - Groepsmonitor</title>
    <style>
        :root { --bg: #fdfcf8; --primary: #2c3e50; --accent: #8e44ad; --text: #34495e; --gold: #f1c40f; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; padding-bottom: 180px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 10px; }
        .main-header { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .top-reset-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .screen { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; min-height: 550px; }
        .active { display: block; animation: fadeIn 0.4s; }
        .scroll-box { background: #fffcf0; padding: 20px; border: 1px solid #ddd; line-height: 1.7; height: 450px; overflow-y: auto; border-radius: 6px; white-space: pre-wrap; }
        
        .cv-title { font-weight: bold; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #ccc; margin-bottom: 8px; display: block; margin-top: 15px; }
        
        .admin-bar { position: fixed; bottom: 0; left:0; width: 100%; background: #1a1a1a; padding: 15px; display: flex; overflow-x: auto; gap: 20px; z-index: 1000; align-items: flex-start; }
        .screen-btn { background: #444; color: white; border: none; padding: 12px 18px; border-radius: 6px; white-space: nowrap; cursor: pointer; }
        .current-btn { background: var(--accent) !important; font-weight: bold; }
        
        .canvas { position: relative; height: 500px; border: 2px dashed #ccc; background: #fff; overflow: hidden; touch-action: none; margin-top: 10px; border-radius: 8px; }
        .draggable { position: absolute; padding: 10px 20px; background: white; border: 2px solid var(--primary); border-radius: 30px; cursor: move; box-shadow: 0 4px 8px rgba(0,0,0,0.1); font-weight: bold; white-space: nowrap; touch-action: none; user-select: none; z-index: 10; }
        .item-Jezus { border-color: var(--gold); border-width: 3px; }
        .item-God { border-color: #c0392b; border-width: 3px; }

        .ans-pill { background: white; padding: 12px; border: 1px solid #ddd; border-radius: 6px; display: block; margin-top: 10px; font-style: italic; }
        .q-block { background: #f9f9f9; padding: 15px; border-left: 4px solid var(--accent); margin-bottom: 25px; border-radius: 0 8px 8px 0; }
        .q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: block; }
        
        input[type="text"], textarea { padding: 12px; border: 1px solid #ccc; width: 90%; border-radius: 4px; font-size: 16px; font-family: inherit; margin-bottom: 10px; }
        .action-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .arrow-btn { background: #555; color: white; border: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }

        .music-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1 class="main-header">Hebreeën Les 2</h1>
        <button class="top-reset-btn" onclick="window.resetAllData()">RESET APP</button>
    </div>
    <div id="main-container"></div>
</div>

<div id="admin-bar" class="admin-bar"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcC2ZvkbWDuXLWSGmCpM2wfBnm65UYrbQ",
        authDomain: "z53bijbelstudie.firebaseapp.com",
        projectId: "z53bijbelstudie",
        storageBucket: "z53bijbelstudie.firebasestorage.app",
        messagingSenderId: "86708654444",
        appId: "1:86708654444:web:729295ba18f564b841a349"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const initialHierarchy = ['God', 'Jezus', 'Mozes', 'Koning', 'Engel', 'Priester', 'Leiders', 'Profeten', 'Ik'];

    let screenConfigs = {
        login: { title: 'Inloggen', type: 'custom', content: `<div style="text-align: center;"><img src="Screenshot 2026-03-07 07.35.41.png" style="width: 100%; max-width: 500px; border-radius: 12px; margin-bottom: 20px;"><div id="login-form"><p>Voer je naam in:</p><input type="text" id="in-login-name"><br><button class="action-btn" onclick="window.handleLogin()">DOE MEE</button></div><div id="welcome-message" style="display:none;"><h3>Welkom, <span id="user-display-name"></span>!</h3></div><div style="margin-top: 30px;"><h4>Aanwezig:</h4><div id="login-live-feed"></div></div></div>` },
        vorige_keer: { title: 'Uit vorige keer', type: 'vorige_keer' },
        mozes_cv: { title: '1. Mozes CV', type: 'bible', text: `<span class="cv-title">Wie ben ik?</span> Een trouwe dienaar in Gods huis.\n\n• Prins van Egypte geweest.\n• Het volk bevrijd.\n• 40 jaar dienst in de woestijn.\n• Ontving de Wet op de Sinai.\n• Sprak met God als met een vriend.` },
        hierarchy: { title: 'Hiërarchie', type: 'shared-drag' },
        reading: { title: 'De Tekst', type: 'bible', text: `<strong>Hebreeën 3:1-19 (HSV)</strong><br><br>[1] Daarom, heilige broeders, deelgenoten aan de hemelse roeping, let op de Apostel en Hogepriester van onze belijdenis: Christus Jezus.\n[2] Hij is getrouw aan Hem Die Hem aangesteld heeft, zoals ook Mozes in heel Zijn huis.\n[3] Want Deze is zoveel meer heerlijkheid waardig geacht dan Mozes, naarmate hij die het huis gebouwd heeft, meer eer ontvangt dan het huis zelf.\n[4] Elk huis wordt immers door iemand gebouwd, maar Hij Die dit alles gebouwd heeft, is God.\n[5] En Mozes was wel getrouw in heel Zijn huis als dienaar, om te getuigen van what later gesproken zou worden,\n[6] maar Christus is getrouw als Zoon over Zijn huis. Zijn huis zijn wij, als wij de vrijmoedigheid en de roem van de hoop tot het einde toe onwrikbaar vasthouden.\n[7] Daarom, zoals de Heilige Geest zegt: Heden, als u Zijn stem hoort,\n[8] verhard dan uw hart niet, zoals bij de verbittering, op de dag van de verzoeking in de woestijn.\n[9] Daar hebben uw vaderen Mij verzocht; zij hebben Mij op de proef gesteld en Mijn werken gezien, veertig jaar lang.\n[10] Daarom ben Ik toornig geworden op dat geslacht en heb gezegd: Altijd dwalen zij met hun hart, en zij hebben Mijn wegen niet gekend.\n[11] Daarom heb Ik in Mijn toorn gezworen: Zij zullen Mijn rust niet binnengaan!\n[12] Zie erop toe, broeders, dat er in niemand van u een boosaardig hart is, vol ongeloof, om daardoor afvallig te worden van de levende God;\n[13] maar vermaan elkaar elke dag, zolang men van een heden kan spreken, opdat niemand van u verhard wordt door de misleiding van de zonde.\n[14] Want wij zijn deelgenoten van Christus geworden, als wij het begin van de vaste grond van het vertrouwen tot het einde toe onwrikbaar vasthouden,\n[15] terwijl er wordt gezegd: Heden, als u Zijn stem hoort, verhard dan uw hart niet, zoals in de verbittering.\n[16] Want sommigen die de stem gehoord hadden, hebben Hem verbitterd, maar niet allen die onder leiding van Mozes uit Egypte waren getrokken.\n[17] Op wie is Hij dan veertig jaar lang toornig geweest? Was het niet op hen die gezondigd hadden, van wie de lichamen in de woestijn gevallen zijn?\n[18] En aan wie heeft Hij gezworen dat zij Zijn rust niet zouden binnengaan, dan aan hen die ongehoorzaam geweest waren?\n[19] Zo zien wij dat zij niet konden binnengaan vanwege hun ongeloof.` },
        lied: { title: 'Lied', type: 'custom', content: `<div class="music-layout"><div class="video-container"><iframe src="https://www.youtube.com/embed/ooUzRgI6e_s" frameborder="0" allowfullscreen></iframe></div><div class="scroll-box"><strong>De woestijn zal bloeien als een roos</strong><br><br><p>De woestijn zal bloeien als een roos<br>\n    En de steppe zal jubelen en juichen<br>\n    Want het levend water van Gods Geest<br>\n    Maakt dorstig land tot waterbronnen</p>\n\n    <p>De woestijn zal bloeien als een roos<br>\n    En de steppe zal jubelen en juichen<br>\n    Want het levend water van Gods Geest<br>\n    Maakt dorstig land tot waterbronnen</p>\n\n    <p>Sta op Sion en juich<br>\n    Want de Here heeft u verlost<br>\n    Want de lamme zal springen als een hert<br>\n    En de stomme zal jubelen en juichen</p>\n\n    <p>Sta op Sion en juich<br>\n    Want de Here heeft u verlost<br>\n    Want de lamme zal springen als een hert<br>\n    En de stomme zal jubelen en juichen</p>\n\n    <p>Lai lai lai...</p></div></div>` },
        vraag_stellen: { title: 'Vragen & Antwoorden', type: 'custom', content: `
            <div style="border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
                <p><strong>Stel een nieuwe vraag:</strong></p>
                <input type="text" id="in-new-question" placeholder="Typ hier je vraag...">
                <button class="action-btn" onclick="window.sendData('new-question','questions','text')">VRAAG VERSTUREN</button>
            </div>
            <p><strong>Beantwoord een vraag van een ander:</strong></p>
            <div id="question-live-feed" class="scroll-box">Laden...</div>` 
        },
        antwoorden_monitor: { title: 'Antwoorden Monitor', type: 'answer_monitor' },
        zinnen_input: { title: 'Zinnen Verzamelen', type: 'poem_input' },
        cv_invullen: { title: 'Jouw CV Invullen', type: 'custom', content: `<p>Schrijf kort jouw 'CV' op dit moment:</p><textarea id="in-usercv" rows="4" placeholder="Ik ben woestijnganger, binnentreder, leader, profeet, of..."></textarea><br><button class="action-btn" onclick="window.sendData('usercv','user_cvs','text')">VERSTUUR MIJN CV</button>` },
        cv_monitor: { title: 'Live CV Feed', type: 'cv_feed' },
        binnentreder_cv: { title: '3. Binnentreder CV', type: 'bible', text: `<span class="cv-title">Wie zijn wij?</span> Binnentreders van het beloofde land.\n\n• Ik hoor de stem en verhard mijn hart niet.\n• Ik houd vast aan de hoop tot het einde.\n• Ik treed binnen in de Rust van God.\n• Berichten van verspieders slaan mij niet uit het veld.` },
        creation: { title: 'Onze Psalm', type: 'dragdrop' },
        blessing: { title: 'Zegen', type: 'info', content: `<div class="scroll-box">Vader, wij vragen U ons geloof in U te verdiepen. Geef ons de kracht om verleiding te weerstaan, twijfel te overwinnen en trouw aan U te blijven. Geef dat wij aan het eind van ons leven deze woorden mogen horen: ‘Voortreffelijk, je bent een goede en betrouwbare dienaar.’</div>` }
    };

    let currentActiveId = 'login';
    let myName = "";

    window.handleLogin = async () => {
        const nameInput = document.getElementById('in-login-name');
        myName = nameInput.value.trim();
        if (myName) {
            await addDoc(collection(db, 'names'), { name: myName, timestamp: Date.now() });
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('user-display-name').innerText = myName;
            document.getElementById('welcome-message').style.display = 'block';
        }
    };

    window.sendAnswer = async (qId) => {
        const input = document.getElementById(`ans-${qId}`);
        if (input && input.value.trim()) {
            await addDoc(collection(db, 'answers'), {
                questionId: qId,
                text: input.value.trim(),
                user: myName || "Anoniem",
                timestamp: Date.now()
            });
            input.value = "";
            alert("Antwoord verzonden!");
        }
    };

    window.sendData = async (id, col, field) => {
        const el = document.getElementById(`in-${id}`);
        if (el && el.value) { 
            const data = { [field]: el.value, timestamp: Date.now(), user: myName || "Anoniem" };
            await addDoc(collection(db, col), data); 
            el.value = ""; 
            alert("Verzonden!");
        }
    };

    window.updateRemoteScreen = async (id) => { 
        if (id === 'hierarchy') {
            const snap = await getDocs(collection(db, "hierarchy_items"));
            if (snap.empty) {
                for (let i = 0; i < initialHierarchy.length; i++) {
                    await addDoc(collection(db, "hierarchy_items"), { text: initialHierarchy[i], x: 150 + (Math.random() * 50), y: 150 + (Math.random() * 50) });
                }
            }
        }
        await setDoc(doc(db, "appState", "current"), { activeScreen: id }, { merge: true }); 
    };

    window.moveScreen = (fromIndex, toIndex) => {
        const keys = Object.keys(screenConfigs);
        const item = keys.splice(fromIndex, 1)[0];
        keys.splice(toIndex, 0, item);
        const newOrder = {}; keys.forEach(k => { newOrder[k] = screenConfigs[k]; });
        screenConfigs = newOrder; renderApp(); updateVisuals();
    };

    window.resetAllData = async () => {
        if(confirm("Alles resetten?")){
            await setDoc(doc(db, "appState", "current"), { activeScreen: 'login' });
            for(const c of ['names', 'poem_lines', 'hierarchy_items', 'vorige_keer', 'user_cvs', 'questions', 'answers']) {
                const q = await getDocs(collection(db, c));
                for(const d of q.docs) { await deleteDoc(doc(db, c, d.id)); }
            }
            location.reload();
        }
    };

    function setupDragging(el, id, type) {
        let isDragging = false;
        el.onpointerdown = (e) => { isDragging = true; el.setPointerCapture(e.pointerId); };
        el.onpointermove = (e) => {
            if (!isDragging) return;
            const r = el.parentElement.getBoundingClientRect();
            el.style.left = Math.max(0, Math.min(r.width - el.offsetWidth, e.clientX - r.left - el.offsetWidth / 2)) + "px";
            el.style.top = Math.max(0, Math.min(r.height - el.offsetHeight, e.clientY - r.top - el.offsetHeight / 2)) + "px";
        };
        el.onpointerup = async () => { 
            isDragging = false; 
            if(type === 'shared') {
                await updateDoc(doc(db, "hierarchy_items", id), { x: parseInt(el.style.left), y: parseInt(el.style.top) });
            }
        };
    }

    function renderApp() {
        const container = document.getElementById('main-container');
        const adminBar = document.getElementById('admin-bar');
        container.innerHTML = ""; adminBar.innerHTML = "";
        
        Object.keys(screenConfigs).forEach((id, index, array) => {
            const s = screenConfigs[id];
            const div = document.createElement('div');
            div.id = `screen-${id}`; div.className = 'screen';
            let html = `<h2>${s.title}</h2>`;
            if (s.type === 'bible') html += `<div class="scroll-box">${s.text}</div>`;
            if (s.type === 'shared-drag') html += `<div id="canvas-hierarchy" class="canvas"></div>`;
            if (s.type === 'poem_input') html += `<input type="text" id="in-poem" placeholder="Voeg een regel toe..."><br><button class="action-btn" onclick="sendData('poem','poem_lines','text')">STUUR</button>`;
            if (s.type === 'cv_feed') html += `<div id="cv-live-feed" class="scroll-box"></div>`;
            if (s.type === 'dragdrop') html += `<div id="canvas-creation" class="canvas"></div>`;
            if (s.type === 'answer_monitor') html += `<div id="answer-monitor-feed" class="scroll-box">Laden...</div>`;
            if (s.type === 'vorige_keer') html += `<input type="text" id="in-vorige" placeholder="Wat is je bijgebleven?"><br><button class="action-btn" onclick="sendData('vorige','vorige_keer','text')">STUUR</button><div id="vorige-live-feed" class="scroll-box"></div>`;
            if (s.type === 'custom' || s.type === 'info') html += `<div>${s.content}</div>`;
            div.innerHTML = html; container.appendChild(div);

            const btnWrap = document.createElement('div');
            const btn = document.createElement('button');
            btn.className = 'screen-btn'; btn.id = `btn-${id}`; btn.innerText = s.title;
            btn.onclick = () => window.updateRemoteScreen(id);
            const arrows = document.createElement('div');
            arrows.innerHTML = `${index > 0 ? `<button class="arrow-btn" onclick="moveScreen(${index}, ${index-1})">◀</button>` : ''}${index < array.length - 1 ? `<button class="arrow-btn" onclick="moveScreen(${index}, ${index+1})">▶</button>` : ''}`;
            btnWrap.appendChild(btn); btnWrap.appendChild(arrows);
            adminBar.appendChild(btnWrap);
        });
        initDynamicListeners();
    }

    function updateVisuals() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${currentActiveId}`)?.classList.add('active');
        document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('current-btn'));
        document.getElementById(`btn-${currentActiveId}`)?.classList.add('current-btn');
    }

    function initDynamicListeners() {
        onSnapshot(query(collection(db, "names"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('login-live-feed');
            if(feed) feed.innerHTML = snap.docs.map(d => `<span class="ans-pill">${d.data().name}</span>`).join('');
        });

        // LIVE FEED VOOR VORIGE KEER
        onSnapshot(query(collection(db, "vorige_keer"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('vorige-live-feed');
            if(feed) feed.innerHTML = snap.docs.map(d => `<div class="ans-pill"><strong>${d.data().user}:</strong> ${d.data().text}</div>`).join('');
        });

        onSnapshot(query(collection(db, "questions"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('question-live-feed');
            if(feed) {
                feed.innerHTML = snap.docs.map(d => `
                    <div class="q-block">
                        <span class="q-text">${d.data().text}</span>
                        <input type="text" id="ans-${d.id}" placeholder="Jouw antwoord...">
                        <button class="action-btn" onclick="window.sendAnswer('${d.id}')">ANTWOORD</button>
                    </div>
                `).join('');
            }
        });

        onSnapshot(query(collection(db, "answers"), orderBy("timestamp", "asc")), async (ansSnap) => {
            const monitor = document.getElementById('answer-monitor-feed');
            const qSnap = await getDocs(collection(db, "questions"));
            if(monitor) {
                let html = "";
                qSnap.docs.forEach(qDoc => {
                    const qData = qDoc.data();
                    html += `<div style="margin-bottom:30px; border-bottom:2px solid #eee; padding-bottom:10px;">
                        <strong style="color:var(--accent); font-size:1.2rem;">VRAAG: ${qData.text}</strong>`;
                    ansSnap.docs.filter(a => a.data().questionId === qDoc.id).forEach(aDoc => {
                        html += `<div class="ans-pill"><strong>${aDoc.data().user}:</strong> ${aDoc.data().text}</div>`;
                    });
                    html += `</div>`;
                });
                monitor.innerHTML = html || "Nog geen vragen/antwoorden.";
            }
        });

        onSnapshot(query(collection(db, "user_cvs"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('cv-live-feed');
            if(feed) feed.innerHTML = snap.docs.map(d => `<div class="ans-pill"><strong>${d.data().user}:</strong><br>${d.data().text}</div>`).join('');
        });

        onSnapshot(collection(db, "hierarchy_items"), (snap) => {
            const canvas = document.getElementById('canvas-hierarchy');
            if(!canvas) return;
            snap.docs.forEach(d => {
                let el = document.getElementById(`shared-${d.id}`);
                if (!el) {
                    el = document.createElement('div'); el.id = `shared-${d.id}`; 
                    el.className = 'draggable' + (['God','Jezus'].includes(d.data().text) ? ' item-' + d.data().text : '');
                    el.innerText = d.data().text; canvas.appendChild(el); setupDragging(el, d.id, 'shared');
                }
                if(!el.classList.contains('dragging')) {
                    el.style.left = d.data().x + "px"; el.style.top = d.data().y + "px";
                }
            });
        });

        onSnapshot(collection(db, "poem_lines"), (snap) => {
            const canvas = document.getElementById('canvas-creation');
            if(!canvas) return;
            snap.docs.forEach(d => {
                if (!document.getElementById(`poem-${d.id}`)) {
                    const el = document.createElement('div'); el.id = `poem-${d.id}`; 
                    el.className = 'draggable'; el.innerText = d.data().text; 
                    el.style.left = "20px"; el.style.top = (20 + (canvas.children.length * 45)) + "px";
                    canvas.appendChild(el); setupDragging(el, d.id, 'local'); 
                }
            });
        });
    }

    onSnapshot(doc(db, "appState", "current"), (snap) => {
        currentActiveId = snap.data()?.activeScreen || 'login';
        updateVisuals();
    });

    renderApp();
</script>
</body>
</html>

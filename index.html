<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z53 Hebreeën Les 2 - Groepsmonitor</title>
    <style>
        :root { --bg: #fdfcf8; --primary: #2c3e50; --accent: #8e44ad; --text: #34495e; --gold: #f1c40f; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overscroll-behavior-y: contain; overflow-x: hidden; }
        #escape-hatch { position: fixed; top: 5px; left: 5px; z-index: 10001; text-decoration: none; color: rgba(0,0,0,0.1); font-size: 18px; padding: 10px; }
        #admin-trigger { position: absolute; top: 0; left: 0; width: 60px; height: 60px; z-index: 9999; cursor: pointer; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; padding-bottom: 180px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 10px; }
        .main-header { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .admin-bar { position: fixed; bottom: 0; left:0; width: 100%; background: #1a1a1a; padding: 15px; display: none; overflow-x: auto; gap: 15px; z-index: 1000; align-items: flex-start; }
        .top-reset-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; display: none; }
        body.is-admin .admin-bar { display: flex !important; }
        body.is-admin .top-reset-btn { display: block !important; }
        body.is-admin #escape-hatch { color: var(--accent); font-weight: bold; }
        .screen { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; min-height: 550px; }
        .active { display: block; animation: fadeIn 0.4s; }
        .scroll-box { background: #fffcf0; padding: 20px; border: 1px solid #ddd; line-height: 1.7; height: 450px; overflow-y: auto; border-radius: 6px; white-space: pre-wrap; }
        .cv-title { font-weight: bold; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #ccc; margin-bottom: 8px; display: block; margin-top: 15px; }
        .canvas { position: relative; height: 500px; border: 2px dashed #ccc; background: #fff; overflow: hidden; touch-action: none; margin-top: 10px; border-radius: 8px; }
        .draggable { position: absolute; padding: 10px 20px; background: white; border: 2px solid var(--primary); border-radius: 30px; cursor: move; box-shadow: 0 4px 8px rgba(0,0,0,0.1); font-weight: bold; white-space: nowrap; touch-action: none; user-select: none; z-index: 10; transform: translate(-50%, -50%); }
        .item-Jezus { border-color: var(--gold); border-width: 3px; background: #fffef0; }
        .item-God { border-color: #c0392b; border-width: 3px; background: #fee; }
        .ans-pill { background: white; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; display: block; margin-top: 5px; font-style: italic; }
        .q-card { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border: 1px solid #ccc; width: 60%; border-radius: 4px; font-size: 16px; }
        .action-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .screen-btn { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 4px; white-space: nowrap; cursor: pointer; font-size: 14px; }
        .current-btn { background: var(--accent) !important; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<a href="#" id="escape-hatch" onclick="location.reload()">×</a>
<div id="admin-trigger" onclick="handleSecretClick()"></div>
<div class="container">
    <div class="header-flex">
        <h1 class="main-header">Hebreeën Les 2</h1>
        <button id="reset-btn" class="top-reset-btn" onclick="window.resetAllData()">RESET APP</button>
    </div>
    <div id="main-container"></div>
</div>
<div id="admin-bar" class="admin-bar"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, collection, addDoc, getDocs, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcC2ZvkbWDuXLWSGmCpM2wfBnm65UYrbQ",
        authDomain: "z53bijbelstudie.firebaseapp.com",
        projectId: "z53bijbelstudie",
        storageBucket: "z53bijbelstudie.firebasestorage.app",
        messagingSenderId: "86708654444",
        appId: "1:86708654444:web:729295ba18f564b841a349"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isAdmin = false;
    let clickCount = 0;

    window.handleSecretClick = () => {
        clickCount++;
        if (clickCount >= 3) { isAdmin = true; document.body.classList.add('is-admin'); alert("Beheerder modus aan."); clickCount = 0; }
        setTimeout(() => clickCount = 0, 2000);
    };

    const questionsList = [
        { id: 'q1', text: "Wat betekent het voor jou dat Jezus 'meer eer' waard is dan Mozes?" },
        { id: 'q2', text: "In vers 6 staat: 'Zijn huis zijn wij'. Hoe merk je dat in deze groep?" },
        { id: 'q3', text: "Waar zie je vandaag de dag 'verharde harten' (vers 8) in de wereld of bij jezelf?" }
    ];

    let screenConfigs = {
        login: { title: '1. Inloggen', type: 'login' },
        vorige_keer: { title: '2. Vorige keer', type: 'vorige_keer' },
        goals: { title: '3. Doelen', type: 'info', content: '<strong>1. Hiërarchie</strong><br><strong>2. ... en ik dan?</strong><br><strong>3. ... en wij dan?</strong>' },
        mozes_cv: { title: '4. Mozes CV', type: 'bible', text: `<span class="cv-title">Wie ben ik?</span> Een trouwe dienaar in Gods huis.\n\n• Prins van Egypte geweest.\n• Het volk bevrijd.\n• 40 jaar dienst in de woestijn.` },
        hierarchy: { title: '5. Hiërarchie', type: 'shared-drag', initial: ['God', 'Jezus', 'Mozes', 'Koning', 'Engel', 'Priester', 'Leiders', 'Profeten', 'Ik'] },
        reading: { title: '6. De tekst', type: 'bible', text: `<strong>Hebreeën 3:1-19 (HSV)</strong><br><br>[1] Daarom, heilige broeders, deelgenoten aan de hemelse roeping, let op de Apostel en Hogepriester van onze belijdenis: Christus Jezus.<br>[2] Hij is getrouw aan God, Die Hem aangesteld heeft, zoals ook Mozes trouw was in heel Zijn huis.<br>[3] Want Christus is zoveel meer heerlijkheid waard geacht dan Mozes, evenals hij die het huis gebouwd heeft, meer eer ontvangt dan het huis zelf.<br>[4] Immers, elk huis wordt door iemand gebouwd, maar Hij Die dit alles gebouwd heeft, is God.<br>[5] En Mozes is wel trouw geweest in heel Zijn huis, maar als dienaar, om te getuigen van wat later gesproken zou worden;<br>[6] Christus echter is getrouw over Zijn huis als Zoon. Zijn huis zijn wij, als wij tenminste de vrijmoedigheid en de roem van de hoop tot het einde toe onwrikbaar vasthouden.<br><br>[7] Daarom, zoals de Heilige Geest zegt: Heden, indien u Zijn stem hoort,<br>[8] verhard dan uw hart niet, zoals bij de verbittering, op de dag van de verzoeking in de woestijn.<br>[9] Daar hebben uw vaderen Mij verzocht; zij hebben Mij op de proef gesteld en Mijn werken gezien, veertig jaar lang.<br>[10] Daarom ben Ik toornig geworden op dat geslacht en heb gesproken: Altijd dwalen zij met hun hart, en zij hebben Mijn wegen niet gekend.<br>[11] Daarom heb Ik in Mijn toorn gezworen: Mijn rust zullen zij niet binnengaan!<br><br>[12] Zie erop toe, broeders, dat er nooit in iemand van u een verdorven hart zal zijn, vol ongeloof, om daardoor afvallig te worden van de levende God;<br>[13] maar vermaan elkaar elke dag, zolang men van een heden kan spreken, opdat niemand van u verhard zal worden door de verleiding van de zonde.<br>[14] Want wij hebben deel aan Christus gekregen, als wij tenminste het beginsel van de vaste grond van het geloof tot het einde toe onwrikbaar vasthouden,<br>[15] terwijl er wordt gezegd: Heden, als u Zijn stem hoort, verhard dan uw hart niet, zoals in de verbittering.<br><br>[16] Want hoewel sommigen die stem gehoord hadden, hebben zij Hem verbitterd, maar niet allen die onder leiding van Mozes uit Egypte waren getrokken.<br>[17] Op wie is Hij dan veertig jaar lang vertoornd geweest? Was het niet op hen die gezondigd hadden, van wie de lichamen zijn gevallen in de woestijn?<br>[18] En aan wie heeft Hij gezworen dat zij Zijn rust niet zouden binnengaan, dan aan hen die ongehoorzaam geweest waren?<br>[19] Zo zien wij dat zij niet konden ingaan vanwege hun ongeloof.` },
        woestijn_cv: { title: '7. Woestijn CV', type: 'bible', text: `<span class="cv-title">Wie ben ik?</span> Ik ben bevrijd, maar nog niet vrij.\n\n• Elke dag manna.\n• Leren vertrouwen.\n\n<em>De slavernij moet ook uit jou.</em>` },
        binnentreder_cv: { title: '8. Binnentreder CV', type: 'bible', text: `<span class="cv-title">Wie zijn wij?</span> Binnentreders van het beloofde land.\n\n• <strong>Onze tactiek:</strong> Wij horen de stem en verharden ons hart niet.\n• <strong>Onze spionagedata:</strong> Ja, er zijn reuzen, maar hun bescherming is geweken.\n• <strong>Onze kracht:</strong> Wij zijn het huis van de Bouwer; Hij die alles gebouwd heeft is God.\n• <strong>Onze mindset:</strong> Niet terug naar Egypte, maar doorstoten naar de Rust.\n\n<em>Wij stappen over de drempel van ongeloof heen.</em>` },
        persoonlijk_cv_input: { title: '9. Jouw CV', type: 'cv_input' },
        cv_monitor: { title: '10. Live CV Feed', type: 'cv_feed' },
        questions: { title: '11. Vragen invoer', type: 'qa_input' },
        monitor: { title: '12. Monitor', type: 'qa_monitor' },
        zinnen_input: { title: '13. Zinnen verzamelen', type: 'poem_input' },
        creation: { title: '14. Onze Psalm', type: 'dragdrop' },
        blessing: { title: '15. Zegen', type: 'info', content: 'Vader, wij vragen U ons geloof in U te verdiepen. Geef ons de kracht om verleiding te weerstaan, twijfel te overwinnen en trouw aan U te blijven. Geef dat wij tot aan het eind van ons leven deze woorden mogen horen: ‘Voortreffelijk, je bent een goede en betrouwbare dienaar. Ga in vrede.' }
    };

    window.checkLogin = async () => {
        const val = document.getElementById('in-login').value;
        if (val === 'admin123') { isAdmin = true; document.body.classList.add('is-admin'); }
        else if (val) { await addDoc(collection(db, "names"), { name: val, timestamp: Date.now() }); }
        document.getElementById('in-login').value = "";
    };

    window.sendData = async (id, col, field, qId = null) => {
        const el = document.getElementById(id);
        if (el && el.value) { 
            await addDoc(collection(db, col), { [field]: el.value, qId: qId, timestamp: Date.now() }); 
            el.value = ""; 
        }
    };

    window.updateRemoteScreen = async (id) => { 
        if(!isAdmin) return;
        await setDoc(doc(db, "appState", "current"), { activeScreen: id }, { merge: true }); 
    };

    window.resetAllData = async () => {
        if(!isAdmin || !confirm("Alles resetten?")) return;
        await setDoc(doc(db, "appState", "current"), { activeScreen: 'login' });
        for(const c of ['names', 'answers', 'poem_lines', 'hierarchy_items', 'user_cvs', 'vorige_keer']) {
            const q = await getDocs(collection(db, c));
            for(const d of q.docs) { await deleteDoc(doc(db, c, d.id)); }
        }
        location.reload();
    };

    function setupDragging(el, id, isShared) {
        let isDragging = false;
        el.onpointerdown = (e) => { e.stopPropagation(); isDragging = true; el.setPointerCapture(e.pointerId); el.style.zIndex = 1000; };
        el.onpointermove = (e) => {
            if (!isDragging) return;
            const r = el.parentElement.getBoundingClientRect();
            el.style.left = (e.clientX - r.left) + "px"; el.style.top = (e.clientY - r.top) + "px";
        };
        el.onpointerup = async () => { 
            if (!isDragging) return; isDragging = false;
            if(isShared) await updateDoc(doc(db, "hierarchy_items", id), { x: parseInt(el.style.left), y: parseInt(el.style.top) });
        };
    }

    function renderApp() {
        const container = document.getElementById('main-container');
        const adminBar = document.getElementById('admin-bar');
        container.innerHTML = ""; adminBar.innerHTML = "";
        
        Object.keys(screenConfigs).forEach((id, idx) => {
            const s = screenConfigs[id];
            const div = document.createElement('div');
            div.id = `screen-${id}`; div.className = 'screen';
            let html = `<h2>${s.title}</h2>`;
            
            if (s.type === 'login') html += `<input type="text" id="in-login" placeholder="Naam..."><button class="action-btn" onclick="checkLogin()">OK</button><div id="login-names-feed"></div>`;
            if (s.type === 'vorige_keer') html += `<input type="text" id="in-vorige" placeholder="Wat nam je mee?"><button class="action-btn" onclick="sendData('in-vorige','vorige_keer','text')">STUUR</button><div id="vorige-feed" class="scroll-box"></div>`;
            if (s.type === 'info') html += `<div>${s.content}</div>`;
            if (s.type === 'bible') html += `<div class="scroll-box">${s.text}</div>`;
            if (s.type === 'shared-drag') html += `<div id="canvas-hierarchy" class="canvas"></div>`;
            if (s.type === 'cv_input') html += `<input type="text" id="in-cv" placeholder="Ik ben..."><button class="action-btn" onclick="sendData('in-cv','user_cvs','text')">VOEG TOE</button>`;
            if (s.type === 'cv_feed') html += `<div id="cv-feed" class="scroll-box"></div>`;
            if (s.type === 'qa_input') {
                questionsList.forEach(q => {
                    html += `<div class="q-card"><strong>${q.text}</strong><br><input type="text" id="ans-${q.id}" placeholder="Antwoord..."><button class="action-btn" onclick="sendData('ans-${q.id}','answers','text','${q.id}')">STUUR</button></div>`;
                });
            }
            if (s.type === 'qa_monitor') html += `<div id="monitor-feed" class="scroll-box"></div>`;
            if (s.type === 'poem_input') html += `<input type="text" id="in-poem" placeholder="Zin voor psalm..."><button class="action-btn" onclick="sendData('in-poem','poem_lines','text')">STUUR</button>`;
            if (s.type === 'dragdrop') html += `<div id="canvas-creation" class="canvas"></div>`;

            div.innerHTML = html; container.appendChild(div);
            const btn = document.createElement('button'); btn.className = 'screen-btn'; btn.id = `btn-${id}`; btn.innerText = s.title;
            btn.onclick = () => updateRemoteScreen(id); adminBar.appendChild(btn);
        });
        initListeners();
    }

    function initListeners() {
        onSnapshot(collection(db, "names"), s => { const f = document.getElementById('login-names-feed'); if(f) f.innerHTML = s.docs.map(d => `<span class="name-badge">${d.data().name}</span>`).join(''); });
        onSnapshot(collection(db, "user_cvs"), s => { const f = document.getElementById('cv-feed'); if(f) f.innerHTML = s.docs.map(d => `<div class="ans-pill">${d.data().text}</div>`).join(''); });
        onSnapshot(collection(db, "vorige_keer"), s => { const f = document.getElementById('vorige-feed'); if(f) f.innerHTML = s.docs.map(d => `<div class="ans-pill">${d.data().text}</div>`).join(''); });
        onSnapshot(collection(db, "answers"), s => {
            const f = document.getElementById('monitor-feed'); if(!f) return;
            const data = s.docs.map(d => d.data());
            f.innerHTML = questionsList.map(q => `
                <div class="q-card"><strong>${q.text}</strong>
                <div style="margin-top:10px;">${data.filter(a => a.qId === q.id).map(a => `<div class="ans-pill">${a.text}</div>`).join('')}</div>
                </div>`).join('');
        });
        onSnapshot(collection(db, "hierarchy_items"), s => {
            const c = document.getElementById('canvas-hierarchy'); if(!c) return;
            s.docChanges().forEach(ch => {
                const d = ch.doc; const data = d.data(); let el = document.getElementById(`h-${d.id}`);
                if(!el) { el = document.createElement('div'); el.id = `h-${d.id}`; el.className = `draggable ${data.text==='Jezus'?'item-Jezus':''} ${data.text==='God'?'item-God':''}`; el.innerText = data.text; c.appendChild(el); setupDragging(el, d.id, true); }
                el.style.left = data.x + "px"; el.style.top = data.y + "px";
            });
        });
        onSnapshot(collection(db, "poem_lines"), s => {
            const c = document.getElementById('canvas-creation'); if(!c) return;
            s.docChanges().forEach(ch => {
                const d = ch.doc; if(ch.type === 'added' && !document.getElementById(`p-${d.id}`)) {
                    const el = document.createElement('div'); el.id = `p-${d.id}`; el.className = 'draggable'; el.innerText = d.data().text;
                    el.style.left = "150px"; el.style.top = (50 + (c.children.length * 45)) + "px";
                    c.appendChild(el); setupDragging(el, d.id, false);
                }
            });
        });
    }

    onSnapshot(doc(db, "appState", "current"), (snap) => {
        const data = snap.data();
        if(data) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${data.activeScreen}`)?.classList.add('active');
            document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('current-btn'));
            document.getElementById(`btn-${data.activeScreen}`)?.classList.add('current-btn');
        }
    });

    renderApp();
    // Initialize Hierarchy items if empty
    (async () => {
        const snap = await getDocs(collection(db, "hierarchy_items"));
        if (snap.empty) {
            for (const item of screenConfigs.hierarchy.initial) { 
                await setDoc(doc(db, "hierarchy_items", item.toLowerCase()), { text: item, x: 200, y: 200 }); 
            }
        }
    })();
</script>
</body>
</html>
